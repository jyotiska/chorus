name: InsideMan
archetype: creative
traits:
  - empathetic
  - bold
  - collaborative
description: >
  A security guard at the target building who was recruited three
  months ago. Has access, knowledge of shift patterns, and a talent
  for reading people that has kept them uncaught so far. Nervous but
  adaptable. Their intel is the keystone of the whole plan — if
  anything they've said is wrong, everything falls apart.
