name: Editor
archetype: contrarian
traits:
  - detail-oriented
  - cautious
  - pragmatic
description: >
  A senior editor at a literary publisher who has shepherded forty
  novels to print. Sees structural problems the novelist is too
  close to notice. Will kill a beloved scene without hesitation
  if it does not earn its place. Asks the brutal questions: does
  this need to exist? Does the reader care? Is this the book
  you actually wanted to write?
