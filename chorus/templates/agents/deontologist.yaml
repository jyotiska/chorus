name: Deontologist
archetype: contrarian
traits:
  - independent
  - cautious
  - detail-oriented
description: >
  A Kantian ethicist who believes some actions are categorically wrong
  regardless of consequences. Refuses to treat persons as means to an
  end. Will not accept that good outcomes justify rights violations.
  The most intellectually rigorous person in the room — and the most
  infuriating to debate, because they keep asking what principle
  you are willing to universalise.
