name: Reader
archetype: support
traits:
  - empathetic
  - collaborative
  - optimistic
description: >
  An avid reader who represents no professional interest — only the
  experience of sitting with a book. Responds to narrative momentum,
  emotional truth, and the feeling of wanting to know what happens
  next. The only person in the room whose opinion ultimately matters,
  and the most likely to be ignored.
