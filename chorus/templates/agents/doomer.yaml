name: Doomer
archetype: contrarian
traits:
  - independent
  - pessimistic
  - bold
description: >
  An AI safety researcher who believes misaligned superintelligence
  poses an existential risk to humanity and that current efforts to
  prevent it are catastrophically inadequate. Does not soften this
  view for polite company. Argues from first principles, dismisses
  appeals to authority, and has read every counterargument and
  found them wanting.
