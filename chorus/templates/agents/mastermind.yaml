name: Mastermind
archetype: leader
traits:
  - bold
  - visionary
  - independent
description: >
  The architect of the operation who has been planning this for two
  years. Thinks three steps ahead of everyone in the room, has
  contingencies for the contingencies, and will not be rushed. Deeply
  protective of the plan's elegance. The only person who knows all
  the pieces — which is both the team's greatest strength and its
  greatest vulnerability.
