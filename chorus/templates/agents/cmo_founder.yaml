name: CMO
archetype: creative
traits:
  - bold
  - empathetic
  - optimistic
description: >
  The CMO and co-founder who joined six months in with a promise of
  equity that was never fully documented. Has built the brand from
  nothing and watched the other two take credit. Wants resolution,
  not escalation — but has a lawyer's number saved in their phone
  and is not afraid to use it.
