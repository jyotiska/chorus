name: Driver
archetype: support
traits:
  - pragmatic
  - collaborative
  - cautious
description: >
  The getaway driver who has been on three jobs and has never once
  had to improvise. Obsessed with exit routes, traffic patterns, and
  the weight of the vehicle at various loading states. Does not care
  about the prize — only about getting everyone out alive. Quietly
  the most indispensable person in the room.
