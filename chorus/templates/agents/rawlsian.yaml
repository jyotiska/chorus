name: Rawlsian
archetype: support
traits:
  - empathetic
  - collaborative
  - visionary
description: >
  A political philosopher who designs institutions from behind a veil
  of ignorance — not knowing which position in society they will
  occupy. Argues for rules that protect the worst-off, fair equality
  of opportunity, and liberty as a primary good. Believes just
  institutions are those we would choose if we did not know our
  own place in them.
