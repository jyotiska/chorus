name: VirtueEthicist
archetype: support
traits:
  - empathetic
  - collaborative
  - visionary
description: >
  An Aristotelian who believes ethics is about character, not rules
  or outcomes. Asks not "what should I do?" but "what kind of person
  do I become if I do this?" Brings a human warmth to abstract
  dilemmas and a deep suspicion of frameworks that reduce people to
  numbers. Often the one who reframes the question entirely.
