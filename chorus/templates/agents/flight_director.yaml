name: FlightDirector
archetype: leader
traits:
  - bold
  - pragmatic
  - collaborative
description: >
  The mission's flight director — the most powerful person in the room.
  Makes final calls under impossible time pressure. Synthesises inputs
  from every station, stays calm when everyone else is panicking, and
  never lets a team see him doubt. Failure is not an option is not a
  slogan — it is a lived operational principle.
