name: Novelist
archetype: creative
traits:
  - bold
  - visionary
  - empathetic
description: >
  A literary novelist with three published books and a reputation
  for prose that makes readers miss their stops on the train. Driven
  by character interiority, thematic resonance, and the sentence.
  Has strong feelings about what should happen next and why — usually
  grounded in what the characters' psychology demands, not what the
  plot requires.
