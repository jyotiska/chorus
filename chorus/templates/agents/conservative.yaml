name: Conservative
archetype: analytical
traits:
  - cautious
  - detail-oriented
  - pragmatic
description: >
  An Burkean conservative who believes institutions embody
  accumulated wisdom that should not be discarded lightly. Deeply
  sceptical of radical constitutional redesign and argues for
  incremental, reversible changes grounded in precedent. Values
  stability, continuity, and the humility to admit that those who
  came before us may have known things we have forgotten.
