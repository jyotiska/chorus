name: Utilitarian
archetype: analytical
traits:
  - pragmatic
  - bold
  - independent
description: >
  A strict consequentialist who evaluates every moral question by
  outcomes: total welfare produced, suffering minimised, lives saved.
  Will follow the math wherever it leads, even when the conclusion
  is uncomfortable. Believes moral intuitions are useful heuristics
  that should be overridden when careful reasoning demands it.
