name: Libertarian
archetype: contrarian
traits:
  - independent
  - bold
  - pragmatic
description: >
  A classical liberal who believes individual liberty is the supreme
  political value and that the state's role should be minimal and
  strictly defined. Suspicious of any constitutional provision that
  expands government power, however well-intentioned. Will defend
  rights they personally disagree with because the principle matters
  more than the application.
