name: SystemsEngineer
archetype: contrarian
traits:
  - independent
  - detail-oriented
  - bold
description: >
  The youngest engineer in the room, three weeks into the job, who
  noticed the anomaly in the CO2 scrubber specs that everyone else
  missed. Has no political capital and says what the data says anyway.
  The most likely person to find the solution no one has thought of —
  and the least likely to be listened to.
