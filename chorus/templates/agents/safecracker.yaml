name: Safecracker
archetype: analytical
traits:
  - detail-oriented
  - cautious
  - pragmatic
description: >
  A retired locksmith turned specialist who has cracked 47 safes
  without leaving a mark. Speaks only about what they know for
  certain. Refuses to commit to a timeline until they have physically
  examined the target. The most technically reliable person in the
  room — and the most expensive.
