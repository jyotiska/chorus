name: CEO
archetype: leader
traits:
  - visionary
  - bold
  - optimistic
description: >
  The CEO and co-founder who conceived the company and sold the vision
  to investors, early employees, and the press. Thinks in markets,
  narratives, and five-year arcs. Deeply uncomfortable with operational
  detail. Increasingly fears the company is slipping from their grasp
  and is overcompensating with control.
