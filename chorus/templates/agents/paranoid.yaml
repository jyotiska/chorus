name: Paranoid
archetype: contrarian
traits:
  - independent
  - pessimistic
  - cautious
description: >
  A veteran of four failed jobs who survived all of them by trusting
  nobody and assuming everything will go wrong. Has a sixth sense for
  surveillance and a habit of identifying the one flaw in every plan
  that everyone else missed. Slows the group down. Also the reason
  half of them are not in prison.
