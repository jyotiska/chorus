topic: "What should Meridian's core product differentiator be as we prepare for our Series A pitch in 8 weeks?"

context: |
  Meridian is a 14-month-old startup building an AI-powered contract
  management platform for legal teams at mid-size companies (200–2,000
  employees). The product extracts key clauses, flags risk, tracks
  obligations, and surfaces renewal deadlines automatically.

  The competitive landscape:
  - Ironclad and ContractPodAi dominate the enterprise segment (10,000+ employees)
  - DocuSign CLM is expanding downmarket and has significant brand recognition
  - Three well-funded startups launched in the past year targeting the same segment
  - Most competitors lead with workflow automation; Meridian currently leads
    with risk analysis accuracy (independently benchmarked at 94% vs 78% industry average)

  What Meridian has:
  - 31 paying customers, $420K ARR, growing at 14% month-over-month
  - A proprietary legal clause taxonomy trained on 2.3M contracts
  - An integration with Salesforce that competitors lack
  - A customer retention rate of 96% over 12 months
  - Three enterprise pilots stalled because procurement requires SOC 2 Type II
    certification, which Meridian does not yet have (estimated 4 months to complete)

  What Meridian lacks:
  - A clear, memorable differentiator that holds up in a 30-second pitch
  - A story that explains why Meridian wins against better-funded competitors
  - Consensus internally on whether to double down on accuracy, expand into
    workflow, move upmarket, or carve out a vertical niche (e.g. SaaS contracts only)

  The Series A target is $8M at a $32M pre-money valuation. Three firms
  have expressed interest. All three have asked the same question in
  preliminary calls: "Why will you win?"

max_turns: 20

agents:
  - optimist
  - analyst
  - pessimist

provider: anthropic

expectations:
  - Each agent must engage with the competitive landscape specifically —
    not generic strategy advice but positions relative to named competitors
  - "The accuracy advantage must be stress-tested: is 94% vs 78% defensible
    as a moat, or will competitors close the gap before Series B?"
  - The team must evaluate at least three distinct positioning options and
    reach a clear view on which is strongest for the Series A pitch
  - The SOC 2 gap must be addressed — does it change the positioning strategy
    or is it a tactical item that doesn't affect the core narrative?
  - "The Salesforce integration advantage must be weighed: is it a differentiator
    or a feature that larger competitors will replicate in 6 months?"
  - "The discussion must produce a single positioning statement — one sentence
    that answers 'Why will you win?' — that all agents can defend"
  - The pessimist must identify the most likely reason Meridian loses to a
    competitor in 18 months, and the team must respond to it directly
