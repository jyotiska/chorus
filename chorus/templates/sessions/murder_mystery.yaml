topic: "Who murdered Lord Ashford in the study on the night of the 14th — and why does the answer implicate everyone in this room?"

context: |
  Lord Edmund Ashford, 71, was found dead in his locked study at Blackmoor Hall
  at 11:47pm on the night of November 14th. Cause of death: blunt force trauma
  to the back of the skull. The study was locked from the inside with a deadbolt.
  A secret passage behind the mahogany bookshelf was discovered the following
  morning — it connects to the kitchen and to the east bedroom on the first floor.

  Established facts:
  - Lord Ashford changed his will three days ago. His solicitor is the only
    person who knows the new beneficiaries — and he is in this room.
  - A Flemish oil painting ("The Merchant's Return," valued at £40,000) was
    removed from the study wall during the night. Its location is unknown.
  - The butler served Lord Ashford a whisky at 10:15pm. He claims Ashford
    was alive and "in good spirits, if preoccupied."
  - The Duchess of Everly arrived unannounced at 9:30pm. She had not been
    invited and has not explained why she came.
  - The gardener, working late to repair a greenhouse pane, reports hearing
    raised voices from the study at 10:45pm — one voice was a woman's.
  - A monogrammed handkerchief was found beneath the body. The initials: E.V.
    The Duchess's full name is Eleanor Vivienne Ashford-Wren.
  - The gardener has his own reason to want Lord Ashford dead that he has
    not disclosed to anyone.
  - The butler knows what was in the previous will and stands to lose
    significantly under any change.

  What each character knows but has not yet shared:
  - The detective suspects the passage was used but cannot prove direction of travel.
  - The butler saw someone enter the east bedroom from the passage at 11:10pm.
  - The Duchess came to return a letter that would have destroyed her reputation.
    She never got to give it back. She still has it.
  - The gardener saw Lord Ashford alive at 11:15pm — through the study window.
    This means the time of death is later than reported.
  - The lawyer knows the new will disinherits everyone present and leaves
    the estate to an illegitimate son no one knew existed.

max_turns: 40

agents:
  - detective
  - butler
  - duchess
  - gardener
  - lawyer

provider: ollama
model: gemma3:4b

expectations:
  - Each character must protect their own interests while appearing to
    cooperate — withhold what would incriminate you, volunteer what
    implicates others
  - The detective must force at least three direct contradictions between
    characters' accounts and name them explicitly when they occur
  - The butler's sighting of someone in the passage must emerge naturally
    from questioning — not volunteered until pressure forces it
  - The gardener's revised time of death must surface by turn 20 and
    shatter the assumed sequence of events
  - The Duchess's letter must be revealed, and the group must determine
    whether it is the motive or a red herring
  - The lawyer must decide whether attorney-client privilege survives the
    client's death — and the answer must change the power dynamics of the room
  - The real murderer must have a motive more compelling than greed alone
  - The detective's final accusation must be supported by at least three
    independent pieces of evidence that emerged during questioning
  - The conversation must not converge on a single suspect before turn 28
  - The final resolution must leave at least one character implicated in
    something they cannot explain away — even if they did not commit the murder
