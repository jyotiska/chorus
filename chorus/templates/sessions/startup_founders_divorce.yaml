topic: "Is this company still worth saving, and if so — on whose terms?"

context: |
  Axiom Labs is 18 months old. The product is live, growing slowly,
  and not yet profitable. The three co-founders are meeting alone for
  the first time in six weeks. No lawyers, no investors, no employees.

  The situation:
  - The company raised $2.1M in a seed round 12 months ago
  - Monthly burn is $85K. Runway: 7 months at current rate
  - Revenue is $18K MRR, growing at 8% month-over-month
  - The CEO has been in conversations with a strategic acquirer without
    telling the other founders. Term sheet is expected this week
  - The CTO has been approached by a Series B startup and has a verbal
    offer for $340K/year plus equity — 3x their current salary
  - The CMO discovered last month that their equity agreement was never
    properly executed and they may hold 0% of the company legally
  - The board is calling an emergency meeting in 10 days
  - No one has told the 8 employees that any of this is happening

  Each founder has come to this meeting with a different agenda.
  The CTO wants out cleanly. The CEO wants control. The CMO wants
  what was promised to them. All three still care about what they built.
  None of them know how to say that.

max_turns: 40

agents:
  - ceo_founder
  - cto_founder
  - cmo_founder

provider: ollama
model: qwen3:0.6b

expectations:
  - The conversation must surface the acquisition conversation by turn 15
  - Each founder must articulate what they actually want — not just their
    stated position — by the halfway point
  - The CMO's equity situation must be directly addressed, not avoided
  - "The group must decide between at least three options: full acquisition,
    recapitalisation with one founder buying out another, or dissolution"
  - The CTO must decide whether to take the outside offer
  - The conversation should end with either a clear agreement or a clear
    and honest acknowledgement that the partnership is over
  - No one should leave the conversation having said only what they
    came in planning to say
