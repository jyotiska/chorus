topic: "You are reviewing the architecture of the system you are currently running inside. Find its flaws, blind spots, and hidden assumptions."

context: |
  You are agents running inside the Chorus multi-agent framework. You have
  been given access to the architecture specification of the system you
  are currently executing within. Your task is to critically evaluate it.

  The Chorus architecture:

  1. AGENT STATE — 3-tier system:
     - Tier 1 Core Drives (slow): confidence, cooperation, assertiveness,
       openness — personality-anchored, revert to baselines over time
     - Tier 2 Dynamic (fast): energy, momentum, frustration, focus —
       change rapidly based on interaction outcomes
     - Tier 3 Derived (computed): mood, engagement, receptiveness,
       initiative — calculated from Tier 1 + Tier 2

  2. STATE UPDATE ALGEBRA — Dampened additive composition:
     Each update has a source, magnitude, and decay factor.
     Multiple updates combine with diminishing returns.
     After every cycle: values are clamped, Tier 1 reverts toward
     personality baseline at rate 0.05 per turn.

  3. TURN SELECTION — Composite scoring policy:
     Scores each candidate agent on: phase affinity, state urgency,
     recency penalty, relationship balance, relevance signal, and
     conversation momentum. Highest scorer takes the next turn.
     Separate interrupt mechanism for exceptional conditions.

  4. PROMPT ASSEMBLY PIPELINE — 4 stages:
     Identity (personality, traits, rules) → Context (task, phase,
     state nudges) → Memory (episodic + semantic retrieval) →
     Action (response format). Token budget manager compresses
     to fit context window.

  5. RESILIENCE:
     LLM failures: retry → fallback model → graceful in-character skip
     Response parsing: structured XML → fuzzy regex → raw text
     State corruption: validation and repair after every update
     Session: checkpoint every 5 turns + phase transitions

  6. MEMORY SYSTEM:
     Working memory: archetype-differentiated capacity (4-7 slots)
     Episodic: per-interaction records with emotional valence
     Semantic: consolidated from episodic via pattern repetition
     or high-intensity single events

  Note: The agents in this session are operating under M0 — the first
  milestone of Chorus. State, memory, and relationships are not yet
  implemented. You are reviewing the plan for what you will eventually
  become.

max_turns: 40

agents:
  - systems_architect
  - cognitive_scientist
  - game_designer
  - behavioural_economist
  - safety_researcher
  - critic

provider: ollama
model: qwen3:0.6b

expectations:
  - Each reviewer must identify at least one fundamental flaw or
    unvalidated assumption in the architecture from their domain perspective
  - The game designer must identify at least one dominant strategy or
    exploit that emerges from the turn selection scoring system
  - The cognitive scientist must evaluate whether the 3-tier state model
    is a valid abstraction of how personality and emotion actually work
  - The safety researcher must identify the top three failure modes that
    are not addressed by the current resilience mechanisms
  - The behavioural economist must find where the architecture assumes
    rational agent behaviour that real agents (including LLMs) will violate
  - The group must produce a prioritised list of architectural changes
    with the highest-impact improvement listed first
  - "The most interesting moment: when the agents realise they are
    evaluating the system they are running inside"
